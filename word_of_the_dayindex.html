<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of the Day</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .app { width: 100%; max-width: 560px; }
  h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 1.5rem; }
  .setup-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 2rem; text-align: center; }
  .setup-card p { font-size: 15px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
  .age-input-row { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
  .age-input-row input { width: 90px; padding: 10px 14px; border-radius: 9px; border: 1px solid #e5e5e5; font-size: 18px; text-align: center; }
  .age-input-row input:focus { outline: none; border-color: #2563eb; }
  .btn-start { padding: 12px 32px; border-radius: 9px; font-size: 15px; cursor: pointer; background: #2563eb; color: #fff; border: none; font-weight: 500; }
  .btn-start:hover { background: #1d4ed8; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .date-lbl { font-size: 13px; color: #888; }
  .top-right { display: flex; gap: 8px; align-items: center; }
  .streak { font-size: 13px; color: #888; background: #fff; padding: 4px 14px; border-radius: 999px; border: 1px solid #e5e5e5; }
  .level-badge { font-size: 12px; padding: 4px 12px; border-radius: 999px; border: 1px solid; cursor: pointer; }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
  .pos-badge { font-size: 12px; background: #e8f0fe; color: #2563eb; padding: 2px 10px; border-radius: 999px; display: inline-block; margin-bottom: 0.75rem; }
  .word-h { font-weight: 600; color: #111; margin-bottom: 4px; }
  .phon { font-size: 14px; color: #888; margin-bottom: 1rem; }
  .label { font-size: 11px; font-weight: 600; color: #bbb; letter-spacing: 0.07em; margin-bottom: 6px; text-transform: uppercase; }
  .defn { color: #222; line-height: 1.6; margin-bottom: 1.25rem; }
  .sent-box { background: #f8f9ff; border-left: 3px solid #2563eb; border-radius: 0 8px 8px 0; padding: 12px 16px; color: #333; line-height: 1.7; font-style: italic; }
  .sent-box strong { font-style: normal; color: #2563eb; font-weight: 600; }
  .actions { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
  .btn { flex: 1; min-width: 110px; padding: 11px; border-radius: 9px; font-size: 14px; cursor: pointer; border: 1px solid #e5e5e5; background: transparent; color: #555; }
  .btn:hover { background: #f5f5f5; }
  .btn-primary { background: #e8f0fe; color: #2563eb; border-color: #bfcffc; }
  .btn-primary:hover { background: #d4e2fd; }
  .quiz-prompt { font-size: 15px; color: #666; margin-bottom: 1rem; }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt { padding: 10px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; background: transparent; color: #222; border: 1px solid #e5e5e5; text-align: left; line-height: 1.4; }
  .opt:hover { background: #f5f5f5; }
  .opt.correct { background: #dcfce7; color: #166534; border-color: #86efac; }
  .opt.wrong { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .q-result { margin-top: 1rem; font-size: 14px; color: #333; display: none; }
  .hist-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 8px; }
  .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 6px; gap: 8px; }
  .hist-word { font-size: 14px; font-weight: 600; color: #111; white-space: nowrap; }
  .hist-def { font-size: 12px; color: #888; }
  .fun-fact { font-size: 13px; color: #6b7280; background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; margin-top: 10px; }
</style>
</head>
<body>
<div class="app">
  <h1>📖 Word of the Day</h1>

  <!-- Setup screen -->
  <div class="setup-card" id="setup-screen">
    <p>Enter your age to get vocabulary words matched to your level!</p>
    <div class="age-input-row">
      <input type="number" id="age-input" min="4" max="99" placeholder="Age" />
    </div>
    <button class="btn-start" onclick="startApp()">Let's go →</button>
  </div>

  <!-- Main app -->
  <div id="main-app" style="display:none">
    <div class="top-bar">
      <span class="date-lbl" id="date-lbl"></span>
      <div class="top-right">
        <span class="level-badge" id="level-badge" onclick="changeAge()" title="Change age"></span>
        <span class="streak" id="streak-lbl">🔥 0 day streak</span>
      </div>
    </div>

    <div class="card">
      <span class="pos-badge" id="pos-badge"></span>
      <div class="word-h" id="word-h"></div>
      <div class="phon" id="phon"></div>
      <div class="label">Definition</div>
      <div class="defn" id="defn"></div>
      <div class="label">Example</div>
      <div class="sent-box" id="sent"></div>
      <div class="fun-fact" id="fun-fact" style="display:none"></div>
      <div class="actions">
        <button class="btn btn-primary" onclick="doQuiz()">🧠 Test me</button>
        <button class="btn" onclick="nextWord()">🔄 Next word</button>
      </div>
    </div>

    <div class="card" id="quiz-card" style="display:none">
      <div class="label">Quick Quiz</div>
      <div class="quiz-prompt" id="q-prompt"></div>
      <div class="quiz-opts" id="q-opts"></div>
      <div class="q-result" id="q-result"></div>
    </div>

    <div id="hist-section" style="display:none">
      <div class="hist-title">Previously learned</div>
      <div id="hist-list"></div>
    </div>
  </div>
</div>

      {word:"Prolix",phonetic:"/PRO-liks/",pos:"adjective",def:"Using too many words; long and tedious in speech or writing.",sentence:"His <strong>prolix</strong> memos were notorious for burying the key point on page three.",wrong:["Beautifully concise","Deeply moving","Very fast-paced"]},

      {word:"Solipsistic",phonetic:"/sol-ip-SIS-tik/",pos:"adjective",def:"Absorbed in oneself; viewing the world only through one's own perspective.",sentence:"His <strong>solipsistic</strong> leadership style meant feedback rarely reached him in any useful form.",wrong:["Deeply empathetic","Extremely organized","Openly collaborative"]},
      {word:"Contumacious",phonetic:"/kon-too-MAY-shus/",pos:"adjective",def:"Stubbornly resistant to authority; insubordinate.",sentence:"The <strong>contumacious</strong> witness refused to answer questions despite repeated judicial warnings.",wrong:["Highly cooperative","Carefully obedient","Extremely generous"]},
      {word:"Pellucid",phonetic:"/puh-LOO-sid/",pos:"adjective",def:"Translucently clear; easily understood.",sentence:"Her <strong>pellucid</strong> prose made the most complex regulatory arguments accessible to any reader.",wrong:["Confusingly vague","Visually striking","Emotionally draining"]},
      {word:"Nugatory",phonetic:"/NOO-guh-tor-ee/",pos:"adjective",def:"Of no value or importance; trifling.",sentence:"The amendment was rendered <strong>nugatory</strong> by the clause that immediately followed it.",wrong:["Extremely important","Widely celebrated","Physically large"]},
      {word:"Fulsome",phonetic:"/FULL-sum/",pos:"adjective",def:"Complimentary or flattering to an excessive degree.",sentence:"The <strong>fulsome</strong> praise in the blurb made readers suspicious before they'd read a word.",wrong:["Harshly critical","Very brief and plain","Completely accurate"]},
      {word:"Parlous",phonetic:"/PAR-lus/",pos:"adjective",def:"Full of danger or uncertainty; perilous.",sentence:"The company found itself in a <strong>parlous</strong> state after two key executives resigned in one week.",wrong:["Completely safe and stable","Very well-funded","Beautifully organized"]},
      {word:"Irenic",phonetic:"/eye-REN-ik/",pos:"adjective",def:"Favoring, operating in, or tending toward peace.",sentence:"The diplomat was known for his <strong>irenic</strong> temperament, finding common ground even in fraught negotiations.",wrong:["Aggressively confrontational","Deeply indifferent","Overly bureaucratic"]},
      {word:"Adumbrate",phonetic:"/AD-um-brayt/",pos:"verb",def:"To outline or sketch in a vague way; to foreshadow.",sentence:"The white paper merely <strong>adumbrated</strong> a framework that would take years to fully develop.",wrong:["To describe in perfect detail","To completely destroy","To publicly celebrate"]},
      {word:"Saturnine",phonetic:"/SAT-ur-nine/",pos:"adjective",def:"Slow and gloomy in temperament; having a sardonic and morose manner.",sentence:"His <strong>saturnine</strong> expression at the retirement party unnerved guests who didn't know him well.",wrong:["Cheerful and outgoing","Extremely energetic","Beautifully composed"]}
    ]
  }
};

function getGroup(age) {
  if (age <= 10) return 'kids';
  if (age <= 14) return 'tweens';
  if (age <= 18) return 'teens';
  if (age <= 29) return 'young_adult';
  if (age <= 49) return 'adult';
  return 'advanced';
}

var SK = 'wotd_age_v1';
var appData = { streak:0, lastDate:'', age:null, seen:{}, history:[] };
var cur = null;

function today() { return new Date().toISOString().split('T')[0]; }

function loadStorage() {
  try { var d = localStorage.getItem(SK); if (d) appData = JSON.parse(d); } catch(e) {}
}

function saveStorage() {
  try { localStorage.setItem(SK, JSON.stringify(appData)); } catch(e) {}
}

function startApp() {
  var age = parseInt(document.getElementById('age-input').value);
  if (!age || age < 4 || age > 99) { alert('Please enter a valid age between 4 and 99.'); return; }
  appData.age = age;
  saveStorage();
  launchMain();
}

function changeAge() {
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('age-input').value = appData.age || '';
}

function launchMain() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  var d = new Date();
  document.getElementById('date-lbl').textContent = d.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});
  setStreak();
  var group = getGroup(appData.age);
  var bank = WORD_BANKS[group];
  var badge = document.getElementById('level-badge');
  badge.textContent = bank.label + '  ✏️';
  badge.style.color = bank.color;
  badge.style.background = bank.bg;
  badge.style.borderColor = bank.border;
  renderHistory();
  showWord(pickWord());
}

function setStreak() {
  document.getElementById('streak-lbl').textContent = '🔥 ' + (appData.streak||0) + ' day streak';
}

function pickWord() {
  var group = getGroup(appData.age);
  var bank = WORD_BANKS[group];
  if (!appData.seen[group]) appData.seen[group] = [];
  var seen = appData.seen[group];
  var unseen = bank.words.filter(function(w){ return seen.indexOf(w.word) === -1; });
  if (!unseen.length) { appData.seen[group] = []; unseen = bank.words; }
  var t = today();
  if (appData.lastDate !== t) { appData.lastDate = t; appData.streak = (appData.streak||0)+1; setStreak(); }
  var pick = unseen[Math.floor(Math.random() * unseen.length)];
  appData.seen[group].push(pick.word);
  saveStorage();
  return pick;
}

function showWord(w) {
  cur = w;
  var group = getGroup(appData.age);
  var sizes = WORD_BANKS[group].fontSize;
  document.getElementById('pos-badge').textContent = w.pos;
  var wh = document.getElementById('word-h');
  wh.textContent = w.word;
  wh.style.fontSize = sizes.word;
  var defn = document.getElementById('defn');
  defn.textContent = w.def;
  defn.style.fontSize = sizes.defn;
  var sent = document.getElementById('sent');
  sent.innerHTML = w.sentence;
  sent.style.fontSize = sizes.sent;
  document.getElementById('phon').textContent = w.phonetic;
  document.getElementById('quiz-card').style.display = 'none';
  var ff = document.getElementById('fun-fact');
  if (WORD_BANKS[group].funFacts && w.fact) {
    ff.textContent = '🌈 Fun fact: ' + w.fact;
    ff.style.display = 'block';
  } else { ff.style.display = 'none'; }
}

function nextWord() { showWord(pickWord()); }

function doQuiz() {
  if (!cur) return;
  var qc = document.getElementById('quiz-card');
  qc.style.display = 'block';
  document.getElementById('q-result').style.display = 'none';
  document.getElementById('q-prompt').textContent = 'What does "' + cur.word + '" mean?';
  var opts = [cur.def].concat(cur.wrong).sort(function(){ return Math.random()-0.5; });
  var container = document.getElementById('q-opts');
  container.innerHTML = '';
  opts.forEach(function(o) {
    var b = document.createElement('button');
    b.className = 'opt';
    b.textContent = o;
    b.onclick = function(){ check(o === cur.def, b, container, cur.def); };
    container.appendChild(b);
  });
  qc.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function check(correct, btn, container, correctDef) {
  Array.from(container.children).forEach(function(b) {
    b.onclick = null;
    if (b.textContent === correctDef) b.className = 'opt correct';
    else if (b === btn && !correct) b.className = 'opt wrong';
  });
  var res = document.getElementById('q-result');
  res.style.display = 'block';
  res.textContent = correct ? '✓ Correct! Great job!' : 'Not quite — the correct answer is highlighted above.';
  if (!appData.history.find(function(h){ return h.word === cur.word; })) {
    appData.history.unshift({word: cur.word, def: cur.def, age: appData.age});
    if (appData.history.length > 30) appData.history.pop();
    saveStorage();
    renderHistory();
  }
}

function renderHistory() {
  var hist = appData.history.slice(0, 5);
  if (!hist.length) return;
  document.getElementById('hist-section').style.display = 'block';
  document.getElementById('hist-list').innerHTML = hist.map(function(h) {
    return '<div class="hist-item"><span class="hist-word">' + h.word + '</span><span class="hist-def">' + h.def.substring(0,50) + '…</span></div>';
  }).join('');
}

// Init
loadStorage();
if (appData.age) {
  document.getElementById('age-input').value = appData.age;
  launchMain();
}
</script>
</body>
</html>
